name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate imports
        run: |
          python -c "from app.main import app; print('FastAPI OK')"
          python -c "from app.model import *; print('Model module OK')"
          python -c "from app.schemas import *; print('Schemas OK')"

      - name: Validate training script
        run: |
          python -m py_compile scripts/train.py