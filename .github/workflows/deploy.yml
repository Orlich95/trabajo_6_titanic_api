name: Deploy Titanic API

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y subir imagen a DockerHub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: orlich95/titanic-api:latest

      - name: Desplegar en EC2 por SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull orlich95/titanic-api:latest
            sudo docker stop titanic-api || true
            sudo docker rm titanic-api || true
            sudo docker run -d -p 8000:8000 --name titanic-api orlich95/titanic-api:latest